# ============================================================
# nd-bot-v2 NGINX site: botv2.nightz.dev
# Runs ALONGSIDE v1 (bot.nightz.dev). Do not touch the v1 site file.
#
# Architecture:
#   - NGINX serves the built SPA from apps/web/dist as static files.
#   - /api/ and /ws are reverse-proxied to the bot HTTP/WS server on
#     127.0.0.1:4010 (API_HOST / API_PORT in .env). This MUST match API_PORT.
#     4010 (not 4000) because this shared VPS already runs another app on 4000.
#
# Install:
#   sudo cp deploy/nginx/botv2.nightz.dev.conf /etc/nginx/sites-available/botv2.nightz.dev
#   sudo ln -s /etc/nginx/sites-available/botv2.nightz.dev /etc/nginx/sites-enabled/botv2.nightz.dev
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then enable HTTPS (see the certbot block at the bottom).
# Adjust the "root" path below if you cloned the repo somewhere other than
# /opt/nd-bot-v2. The SPA build output is at apps/web/dist.
# ============================================================

# --- HTTP (port 80) -----------------------------------------
# Serves the site over plain HTTP until certbot is run. After certbot runs it
# rewrites this block to redirect 80 -> 443; see the commented template below.
server {
    listen 80;
    listen [::]:80;
    server_name botv2.nightz.dev;

    # SPA build output. Update if the repo lives elsewhere.
    root /opt/nd-bot-v2/apps/web/dist;
    index index.html;

    # Let certbot answer the ACME HTTP-01 challenge from here.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 25m;

    # --- REST API -> bot HTTP server ---
    location /api/ {
        proxy_pass http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # --- WebSocket -> bot WS server ---
    location /ws {
        proxy_pass http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- SPA static files + history fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ============================================================
# WebSocket upgrade map. Place this ONCE at the http{} level. On a typical
# Debian/Ubuntu box add it to /etc/nginx/conf.d/websocket_upgrade.conf instead
# of duplicating it per-site (v1 may already define $connection_upgrade; if so,
# do NOT add it again or nginx will fail to start on a duplicate map).
#
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
# ============================================================

# ============================================================
