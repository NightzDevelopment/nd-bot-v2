#   sudo certbot --nginx -d botv2.nightz.dev
#
# certbot will:
#   - obtain a cert into /etc/letsencrypt/live/botv2.nightz.dev/
#   - rewrite the port-80 server block to redirect to 443
#   - inject the ssl server block below
